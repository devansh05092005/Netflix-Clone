<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="main">
            <div class="Z-index">
                <Nav class="Navbar">
                    <div class="logo"><img src="assets/Netflix_logo.svg"></div>
                    <div class="Essentials">
                        <div class="Language-option">
                            <!-- <span><img src="assets/Language_logo.svg"></span> -->
                            <span>
                            <select name="Language" class="Language">
                                <option value="English">English</option>
                                <option value="Hindi">Hindi</option>
                            </select>
                            </span>
                        </div>
                        <div>
                            <button class="SignIn">Sign In</button>
                        </div>
                    </div>
                </Nav>
            </div>
            <div class="box"></div>
        </div>
    </header>
</body>

</html>
