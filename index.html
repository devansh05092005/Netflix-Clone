<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="main">
        <div class="Z-index">
            <Nav class="Navbar">
                <div class="logo"><img src="assets/Netflix_logo.svg"></div>
                <div class="Essentials">
                    <div class="Language-option">
                        <span class="Language_logo"><img src="assets/Language_logo.svg"></span>
                        <span>
                            <select name="Language" class="Language">
                                <option value="English">English</option>
                                <option value="Hindi">Hindi</option>
                            </select>
                        </span>
                    </div>
                    <div>
                        <button class="SignIn">Sign In</button>
                    </div>
                </div>
            </Nav>
            <div>
                <div class="header-line header-line1">Unlimited movies,</div>
                <div class="header-line header-line2">shows, and more</div>
                <div class="header-line header-line3">Starts at ₹149. Cancel at any time.</div>
                <div class="header-line header-line4">Ready to watch? Enter your email to create or restart your
                    membership.</div>
            </div>
            <div class="membership">
                <input type="email" placeholder="Email address" class="email">
                <button class="get-started">Get Started ></button>
            </div>
            <div class="divider">
                <img src="assets/divider.svg">
            </div>
        </div>
        <div class="box"></div>
    </header>
    <main>
        <div class="trending">Trending Now</div>
        <div class="trending-movie">
            <div class="trending-movie-div">
                <div class="movie-number"><div class="movie-poster1"><img src="assets/Trending-movie1.webp"></div>1</div>
                <div class="movie-number"><div class="movie-poster2"><img src="assets/Trending-movie2.webp"></div>2</div>
                <div class="movie-number"><div class="movie-poster3"><img src="assets/Trending-movie3.webp"></div>3</div>
            </div>
            <button class="trending-button">></button>
        </div>
    </main>
</body>

</html>
